<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Headcount Planner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f4f2; color: #1a1a1a; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f0ede8; }
    ::-webkit-scrollbar-thumb { background: #d0cbc4; border-radius: 3px; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    .tab { background:none; border:none; cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; padding:11px 16px; color:#9a918a; border-bottom:2px solid transparent; transition:all 0.15s; }
    .tab.on { color:#e8590c; border-bottom-color:#e8590c; }
    .tab:hover:not(.on) { color:#333; }
    .pi { width:88px; background:#fff; border:1.5px solid #ddd9d3; color:#1a1a1a; font-family:inherit; font-size:13.5px; padding:7px 9px; border-radius:7px; transition:border 0.15s; }
    .pi:focus { outline:none; border-color:#e8590c; box-shadow:0 0 0 3px rgba(232,89,12,0.1); }
    .ti { background:#fff; border:1.5px solid #ddd9d3; color:#1a1a1a; font-family:inherit; font-size:12.5px; padding:5px 8px; border-radius:6px; transition:border 0.15s; }
    .ti:focus { outline:none; border-color:#e8590c; }
    .vi { width:56px; background:#fafaf9; border:1px solid #ddd9d3; color:#1a1a1a; font-family:inherit; font-size:12px; padding:3px 6px; border-radius:5px; text-align:right; transition:border 0.15s; }
    .vi:focus { outline:none; border-color:#e8590c; }
    .lxs { font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#a09488; margin-bottom:10px; }
    .rm { background:none; border:none; cursor:pointer; color:#c8c0b8; font-size:17px; line-height:1; padding:0 2px; transition:color 0.15s; }
    .rm:hover { color:#e03131; }
    .atb { background:none; border:1.5px dashed #d4cfc8; color:#a09488; font-family:inherit; font-size:12px; padding:5px 12px; border-radius:6px; cursor:pointer; transition:all 0.15s; }
    .atb:hover { border-color:#e8590c; color:#e8590c; }
    .upb { background:#fff; border:1.5px solid #ddd9d3; color:#5a524c; font-family:inherit; font-size:12px; font-weight:500; padding:6px 13px; border-radius:7px; cursor:pointer; transition:all 0.15s; }
    .upb:hover { border-color:#e8590c; color:#e8590c; }
    .tgb { background:#fff; border:1.5px solid #ddd9d3; color:#7a7168; font-family:inherit; font-size:12px; font-weight:500; padding:5px 12px; border-radius:6px; cursor:pointer; transition:all 0.15s; }
    .tgb.on { background:#e8590c; border-color:#e8590c; color:#fff; }
    .tgb:hover:not(.on) { border-color:#999; color:#333; }
    .wt { border-collapse:collapse; width:100%; font-size:12px; }
    .wt th { background:#f5f3f0; color:#9a918a; font-size:10.5px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; padding:8px 10px; text-align:center; position:sticky; top:0; z-index:2; border-bottom:1.5px solid #e5e2dd; white-space:nowrap; }
    .wt th.hc { text-align:left; padding-left:14px; position:sticky; left:0; z-index:3; }
    .wt td { padding:0; border-bottom:1px solid #f0ede8; text-align:center; }
    .wt td.hl { text-align:left; padding:5px 10px 5px 14px; color:#9a918a; font-size:11px; white-space:nowrap; background:#fafaf8; position:sticky; left:0; z-index:1; border-right:1px solid #e8e3dc; font-weight:500; }
    .wt tr:hover td { background-color:rgba(0,0,0,0.015); }
    .wt tr:hover td.hl { background:#f5f3f0; }
    .ci { padding:5px 8px; font-size:12px; font-weight:600; color:#1a1a1a; }
    .ce { color:#d0cbc4; font-size:11px; padding:5px 8px; }
    .tr-tot td { background:#f5f3f0 !important; font-weight:700; border-top:1.5px solid #e5e2dd; }
    .tr-tot td.hl { background:#ece8e2 !important; }
    .chip { background:#fff8f5; border:1px solid #fbd5be; border-radius:6px; padding:5px 11px; font-size:11.5px; }
    .card { background:#fff; border:1px solid #e5e2dd; border-radius:10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
    const HOURS = Array.from({ length: 24 }, (_, i) => {
      const h = i % 12 === 0 ? 12 : i % 12;
      return `${h}${i < 12 ? "am" : "pm"}`;
    });
    const TEAM_COLORS = ["#e8590c", "#2f9e44", "#1971c2", "#9c36b5", "#c92a2a"];

    const defaultVolumes = () => {
      const v = {};
      DAYS.forEach(d => { v[d] = {}; HOURS.forEach(h => { v[d][h] = ""; }); });
      return v;
    };

    function formatNum(n) {
      if (isNaN(n) || !isFinite(n)) return "—";
      return Number.isInteger(n) ? n : n.toFixed(2);
    }
    function ceil2(n) {
      return isNaN(n) || !isFinite(n) ? 0 : Math.ceil(n * 100) / 100;
    }
    function heatColor(ratio) {
      if (!ratio || ratio <= 0) return "transparent";
      const alpha = 0.1 + Math.min(1, ratio) * 0.5;
      return `rgba(232,89,12,${alpha.toFixed(2)})`;
    }

    function App() {
      const [volumes, setVolumes] = useState(defaultVolumes());
      const [params, setParams] = useState({ adminTime: 10, cph: 12, aht: 5, shrinkage: 20 });
      const [teams, setTeams] = useState([{ name: "Team A", pct: 50 }, { name: "Team B", pct: 50 }]);
      const [activeTab, setActiveTab] = useState("input");
      const [resultView, setResultView] = useState("agents");
      const [selectedTeam, setSelectedTeam] = useState(null);
      const [uploadError, setUploadError] = useState("");
      const fileRef = useRef();

      const agentProdMinutes = 60 * (1 - params.shrinkage / 100) - params.adminTime;

      function agentsRequired(calls) {
        if (!calls || calls <= 0 || agentProdMinutes <= 0) return 0;
        return (calls * params.aht) / agentProdMinutes;
      }

      function getResults() {
        const byDay = {};
        DAYS.forEach(d => {
          byDay[d] = {};
          HOURS.forEach(h => {
            const raw = parseFloat(volumes[d][h]) || 0;
            byDay[d][h] = {
              calls: raw,
              agents: ceil2(agentsRequired(raw)),
              teamSplit: teams.map(t => ({
                name: t.name,
                calls: raw * (t.pct / 100),
                agents: ceil2(agentsRequired(raw * (t.pct / 100))),
              })),
            };
          });
          byDay[d]._dayTotal = HOURS.reduce((s, h) => s + (parseFloat(volumes[d][h]) || 0), 0);
          byDay[d]._peakAgents = Math.max(0, ...HOURS.map(h => byDay[d][h].agents));
        });
        return byDay;
      }

      const results = getResults();
      const globalMaxCalls = Math.max(1, ...DAYS.flatMap(d => HOURS.map(h => results[d][h].calls)));
      const globalMaxAgents = selectedTeam === null
        ? Math.max(1, ...DAYS.flatMap(d => HOURS.map(h => results[d][h].agents)))
        : Math.max(1, ...DAYS.flatMap(d => HOURS.map(h => results[d][h].teamSplit[selectedTeam]?.agents || 0)));

      function setTeamPct(idx, val) { setTeams(teams.map((t, i) => i === idx ? { ...t, pct: parseFloat(val) || 0 } : t)); }
      function setTeamName(idx, val) { setTeams(teams.map((t, i) => i === idx ? { ...t, name: val } : t)); }
      function addTeam() {
        if (teams.length >= 5) return;
        const even = Math.floor(100 / (teams.length + 1));
        setTeams([...teams.map(t => ({ ...t, pct: even })), { name: `Team ${String.fromCharCode(65 + teams.length)}`, pct: 100 - even * teams.length }]);
      }
      function removeTeam(idx) {
        if (teams.length <= 1) return;
        const next = teams.filter((_, i) => i !== idx);
        const total = next.reduce((s, t) => s + t.pct, 0);
        if (total !== 100 && next.length > 0) next[0].pct += 100 - total;
        setTeams(next);
        if (selectedTeam !== null && selectedTeam >= next.length) setSelectedTeam(null);
      }
      const teamPctTotal = teams.reduce((s, t) => s + t.pct, 0);

      const setVol = (day, hour, val) => setVolumes(prev => ({ ...prev, [day]: { ...prev[day], [hour]: val } }));

      function handleFileUpload(e) {
        setUploadError("");
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const text = ev.target.result;
            const rows = text.trim().split(/\r?\n/).map(r => r.split(/,/).map(c => c.trim()));
            const headerRow = rows[0].map(c => c.toLowerCase());
            const newVols = defaultVolumes();
            let parsed = 0;

            // Detect format by checking if first data cell is an hour label (e.g. "8am")
            const firstDataCell = rows[1]?.[0]?.toLowerCase();
            const isHoursAsRows = HOURS.some(h => h === firstDataCell);

            if (isHoursAsRows) {
              // Format: header = [title, Mon, Tue, ...], rows = [8am, 64, 57, ...]
              const dayHeaders = headerRow.slice(1).map(c => DAYS.find(d => d.toLowerCase() === c.slice(0,3)));
              for (let r = 1; r < rows.length; r++) {
                const hourKey = HOURS.find(h => h === rows[r][0]?.toLowerCase());
                if (!hourKey) continue;
                for (let c = 1; c < rows[r].length; c++) {
                  const dayKey = dayHeaders[c - 1];
                  if (!dayKey) continue;
                  const val = rows[r][c];
                  if (val !== "" && !isNaN(val)) { newVols[dayKey][hourKey] = val; parsed++; }
                }
              }
            } else {
              // Format: header = [title, 12am, 1am ...], rows = [Mon, 7, 5, ...]
              for (let r = 1; r < rows.length; r++) {
                const dayKey = DAYS.find(d => d.toLowerCase() === rows[r][0]?.toLowerCase()?.slice(0,3));
                if (!dayKey) continue;
                for (let c = 1; c < rows[r].length; c++) {
                  const hourKey = HOURS.find(h => h === headerRow[c]);
                  if (!hourKey) continue;
                  const val = rows[r][c];
                  if (val !== "" && !isNaN(val)) { newVols[dayKey][hourKey] = val; parsed++; }
                }
              }
            }

            if (parsed === 0) { setUploadError("Could not parse file — check format."); return; }
            setVolumes(newVols);
            setUploadError("");
          } catch { setUploadError("Failed to read file."); }
        };
        reader.readAsText(file);
        e.target.value = "";
      }

      const weekSummary = DAYS.map(d => ({ day: d, totalCalls: results[d]._dayTotal, peakAgents: results[d]._peakAgents }));
      const grandTotal = weekSummary.reduce((s, d) => s + d.totalCalls, 0);

      function cellValue(d, h) {
        if (resultView === "calls") return results[d][h].calls || null;
        if (selectedTeam === null) return results[d][h].agents || null;
        return results[d][h].teamSplit[selectedTeam]?.agents || null;
      }
      function cellHeat(d, h) {
        const v = cellValue(d, h);
        if (!v) return "transparent";
        return heatColor(v / (resultView === "calls" ? globalMaxCalls : globalMaxAgents));
      }

      const card = { background: "#fff", border: "1px solid #e5e2dd", borderRadius: 10 };

      return (
        <div style={{ fontFamily: "'Inter', sans-serif", background: "#f5f4f2", minHeight: "100vh", color: "#1a1a1a" }}>

          {/* Header */}
          <div style={{ background: "#fff", borderBottom: "1px solid #e5e2dd", padding: "14px 28px", display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{ width: 34, height: 34, borderRadius: 8, background: "linear-gradient(135deg,#e8590c,#fd8f51)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <svg width="17" height="17" viewBox="0 0 18 18" fill="none">
                <rect x="2" y="10" width="3" height="6" rx="1" fill="white" opacity="0.75"/>
                <rect x="7.5" y="6" width="3" height="10" rx="1" fill="white"/>
                <rect x="13" y="2" width="3" height="14" rx="1" fill="white" opacity="0.6"/>
              </svg>
            </div>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, letterSpacing: "-0.02em" }}>Headcount Planner</div>
              <div style={{ fontSize: 11, color: "#a09488", marginTop: 1 }}>Call Centre Resource Calculator</div>
            </div>
          </div>

          {/* Tabs */}
          <div style={{ background: "#fff", borderBottom: "1px solid #e5e2dd", padding: "0 28px", display: "flex", gap: 2 }}>
            {[["input","① Volume Input"],["summary","② Summary"]].map(([id, label]) => (
              <button key={id} className={`tab ${activeTab === id ? "on" : ""}`} onClick={() => setActiveTab(id)}>{label}</button>
            ))}
          </div>

          <div style={{ padding: "24px 28px", maxWidth: 1500, margin: "0 auto" }}>

            {/* ═══ INPUT TAB ═══ */}
            {activeTab === "input" && (
              <div style={{ display: "grid", gridTemplateColumns: "270px 1fr", gap: 22 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

                  {/* Params */}
                  <div style={{ ...card, padding: 18 }}>
                    <div className="lxs">Agent Parameters</div>
                    {[
                      { key: "adminTime", label: "Admin time / hr (mins)" },
                      { key: "cph",       label: "Target CPH" },
                      { key: "aht",       label: "Avg handling time (mins)" },
                      { key: "shrinkage", label: "Shrinkage (%)" },
                    ].map(({ key, label }) => (
                      <div key={key} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <label style={{ fontSize: 12.5, color: "#5a524c" }}>{label}</label>
                        <input type="number" min={0} step={0.5} className="pi"
                          value={params[key]} onChange={e => setParams(p => ({ ...p, [key]: parseFloat(e.target.value) || 0 }))} />
                      </div>
                    ))}
                    <div style={{ marginTop: 10, background: "#fff8f5", border: "1px solid #fbd5be", borderRadius: 7, padding: "10px 12px" }}>
                      <div style={{ fontSize: 10.5, color: "#a09488", fontWeight: 600, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 3 }}>Productive mins / agent / hr</div>
                      <div style={{ fontSize: 22, fontWeight: 700, color: agentProdMinutes > 0 ? "#e8590c" : "#e03131" }}>
                        {agentProdMinutes > 0 ? agentProdMinutes.toFixed(1) : "⚠ check params"}
                      </div>
                    </div>
                  </div>

                  {/* Teams */}
                  <div style={{ ...card, padding: 18 }}>
                    <div className="lxs">Volume Split by Team</div>
                    {teams.map((team, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 9 }}>
                        <div style={{ width: 9, height: 9, borderRadius: "50%", background: TEAM_COLORS[i % TEAM_COLORS.length], flexShrink: 0 }} />
                        <input className="ti" style={{ flex: 1, minWidth: 0 }} value={team.name} onChange={e => setTeamName(i, e.target.value)} />
                        <input type="number" min={0} max={100} className="ti" style={{ width: 48, textAlign: "right" }}
                          value={team.pct} onChange={e => setTeamPct(i, e.target.value)} />
                        <span style={{ fontSize: 12, color: "#a09488" }}>%</span>
                        <button className="rm" onClick={() => removeTeam(i)}>×</button>
                      </div>
                    ))}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 6 }}>
                      <span style={{ fontSize: 11, color: teamPctTotal !== 100 ? "#e03131" : "#9a918a" }}>
                        {teamPctTotal !== 100 ? `⚠ Total: ${teamPctTotal}% (must be 100)` : "✓ 100%"}
                      </span>
                      {teams.length < 5 && <button className="atb" onClick={addTeam}>+ Add team</button>}
                    </div>
                  </div>
                </div>

                {/* Volume entry grid — full weekly heat-map with editable inputs */}
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 12 }}>
                    <div>
                      <div className="lxs" style={{ marginBottom: 3 }}>Call Volumes — enter calls per hour for each day</div>
                      <div style={{ fontSize: 11.5, color: "#a09488" }}>Type directly into any cell. Agents required shown live in the grid below.</div>
                    </div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      {uploadError && <span style={{ fontSize: 11, color: "#e03131" }}>{uploadError}</span>}
                      <button className="upb" onClick={() => fileRef.current.click()}>⬆ Upload CSV</button>
                      <input ref={fileRef} type="file" accept=".csv,.tsv,.txt" style={{ display: "none" }} onChange={handleFileUpload} />
                    </div>
                  </div>

                  {/* Show/Team toggles — identical to Weekly Grid tab */}
                  <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 12, color: "#8a8178", fontWeight: 500 }}>Show:</span>
                    <button className={`tgb ${resultView === "agents" ? "on" : ""}`} onClick={() => setResultView("agents")}>Agents required</button>
                    <button className={`tgb ${resultView === "calls" ? "on" : ""}`} onClick={() => setResultView("calls")}>Call volumes</button>
                    <div style={{ width: 1, height: 22, background: "#e5e2dd", margin: "0 4px" }} />
                    <span style={{ fontSize: 12, color: "#8a8178", fontWeight: 500 }}>Team:</span>
                    <button className={`tgb ${selectedTeam === null ? "on" : ""}`} onClick={() => setSelectedTeam(null)}>All</button>
                    {teams.map((t, i) => (
                      <button key={i} className={`tgb ${selectedTeam === i ? "on" : ""}`}
                        style={selectedTeam === i ? { background: TEAM_COLORS[i % TEAM_COLORS.length], borderColor: TEAM_COLORS[i % TEAM_COLORS.length] } : {}}
                        onClick={() => setSelectedTeam(selectedTeam === i ? null : i)}>{t.name}</button>
                    ))}
                  </div>

                  {/* Stat chips */}
                  <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
                    {[["Prod. mins/hr",`${agentProdMinutes.toFixed(1)} min`],["AHT",`${params.aht} min`],["Shrinkage",`${params.shrinkage}%`],["Admin",`${params.adminTime} min`],["Week calls",grandTotal.toLocaleString()]].map(([l,v]) => (
                      <div key={l} className="chip"><span style={{ color: "#a09488" }}>{l}: </span><span style={{ color: "#e8590c", fontWeight: 700 }}>{v}</span></div>
                    ))}
                  </div>

                  {/* Heat-map grid with editable volume inputs */}
                  <div style={{ ...card, overflow: "hidden" }}>
                    <div style={{ overflowX: "auto", overflowY: "auto", maxHeight: "70vh" }}>
                      <table className="wt">
                        <thead>
                          <tr>
                            <th className="hc">Hour</th>
                            {DAYS.map(d => <th key={d} style={{ minWidth: 100 }}>{d}</th>)}
                            <th style={{ minWidth: 70, color: "#e8590c" }}>Row max</th>
                          </tr>
                        </thead>
                        <tbody>
                          {HOURS.map(h => {
                            const rowVals = DAYS.map(d => cellValue(d, h) || 0);
                            const rowMax = Math.max(0, ...rowVals);
                            return (
                              <tr key={h}>
                                <td className="hl">{h}</td>
                                {DAYS.map(d => {
                                  const val = cellValue(d, h);
                                  const bg = cellHeat(d, h);
                                  return (
                                    <td key={d} style={{ background: bg, padding: "2px 4px" }}>
                                      {resultView === "calls"
                                        ? <input type="number" min={0} className="vi" style={{ width: "100%", background: "transparent", border: "1px solid rgba(0,0,0,0.08)" }}
                                            value={volumes[d][h]} onChange={e => setVol(d, h, e.target.value)} placeholder="—" />
                                        : val > 0
                                          ? <div className="ci">{formatNum(val)}</div>
                                          : <div className="ce">—</div>
                                      }
                                    </td>
                                  );
                                })}
                                <td style={{ background: rowMax > 0 ? "rgba(232,89,12,0.07)" : "transparent" }}>
                                  {rowMax > 0 ? <div className="ci" style={{ color: "#e8590c" }}>{resultView === "agents" ? formatNum(rowMax) : rowMax}</div> : <div className="ce">—</div>}
                                </td>
                              </tr>
                            );
                          })}
                          <tr className="tr-tot">
                            <td className="hl" style={{ fontWeight: 700, fontSize: 10.5, letterSpacing: "0.05em", textTransform: "uppercase", color: "#5a524c" }}>
                              {resultView === "agents" ? "Peak agents" : "Day total"}
                            </td>
                            {DAYS.map(d => {
                              const val = resultView === "agents"
                                ? (selectedTeam === null ? results[d]._peakAgents : Math.max(0, ...HOURS.map(h => results[d][h].teamSplit[selectedTeam]?.agents || 0)))
                                : results[d]._dayTotal;
                              return (
                                <td key={d} style={{ padding: "8px", color: val > 0 ? "#e8590c" : "#c8c0b8" }}>
                                  {val > 0 ? (resultView === "agents" ? formatNum(val) : val.toLocaleString()) : "—"}
                                </td>
                              );
                            })}
                            <td style={{ padding: "8px", color: "#e8590c" }}>
                              {resultView === "agents"
                                ? formatNum(Math.max(0, ...DAYS.map(d => selectedTeam === null ? results[d]._peakAgents : Math.max(0, ...HOURS.map(h => results[d][h].teamSplit[selectedTeam]?.agents || 0)))))
                                : grandTotal.toLocaleString()}
                            </td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                  <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 7, fontSize: 11, color: "#a09488" }}>
                    <span>Heat intensity:</span>
                    {[0.1,0.25,0.42,0.6].map((a,i) => <div key={i} style={{ width: 16, height: 16, borderRadius: 3, background: `rgba(232,89,12,${a})`, border: "1px solid #e5e2dd" }} />)}
                    <span>low → high &nbsp;|&nbsp; Switch to "Call volumes" view to edit values directly in the grid</span>
                  </div>
                </div>
              </div>
            )}

            {/* ═══ SUMMARY TAB ═══ */}
            {activeTab === "summary" && (
              <div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(195px, 1fr))", gap: 14, marginBottom: 22 }}>
                  {weekSummary.map(({ day, totalCalls, peakAgents }) => {
                    const maxCalls = Math.max(1, ...weekSummary.map(d => d.totalCalls));
                    return (
                      <div key={day} style={{ ...card, padding: 16 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                          <div style={{ fontSize: 18, fontWeight: 700 }}>{day}</div>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ fontSize: 10, color: "#a09488", fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase" }}>Peak</div>
                            <div style={{ fontSize: 24, fontWeight: 700, color: "#e8590c", lineHeight: 1 }}>{peakAgents > 0 ? peakAgents : "—"}</div>
                          </div>
                        </div>
                        <div style={{ fontSize: 12, color: "#8a8178", marginBottom: 10 }}>Calls: <span style={{ color: "#1a1a1a", fontWeight: 600 }}>{totalCalls.toLocaleString()}</span></div>
                        {teams.map((t, i) => (
                          <div key={i} style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, fontSize: 11.5 }}>
                            <span style={{ display: "flex", alignItems: "center", gap: 5, color: "#8a8178" }}>
                              <span style={{ width: 7, height: 7, borderRadius: "50%", background: TEAM_COLORS[i % TEAM_COLORS.length], display: "inline-block" }} />
                              {t.name}
                            </span>
                            <span style={{ fontWeight: 600, color: TEAM_COLORS[i % TEAM_COLORS.length] }}>{Math.round(totalCalls * (t.pct / 100)).toLocaleString()}</span>
                          </div>
                        ))}
                        <div style={{ marginTop: 12, height: 3, background: "#f0ede8", borderRadius: 2 }}>
                          <div style={{ height: "100%", width: `${(totalCalls / maxCalls) * 100}%`, background: "#e8590c", borderRadius: 2 }} />
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div style={{ ...card, overflow: "hidden", marginBottom: 18 }}>
                  <div style={{ padding: "13px 18px 9px", borderBottom: "1px solid #e5e2dd" }}>
                    <div className="lxs" style={{ marginBottom: 0 }}>Weekly Summary</div>
                  </div>
                  <table style={{ borderCollapse: "collapse", width: "100%", fontSize: 13 }}>
                    <thead>
                      <tr style={{ background: "#f5f3f0" }}>
                        <th style={{ padding: "9px 18px", textAlign: "left", fontSize: 10.5, fontWeight: 700, color: "#a09488", letterSpacing: "0.06em", textTransform: "uppercase", borderBottom: "1.5px solid #e5e2dd" }}>Day</th>
                        <th style={{ padding: "9px 14px", textAlign: "right", fontSize: 10.5, fontWeight: 700, color: "#a09488", letterSpacing: "0.06em", textTransform: "uppercase", borderBottom: "1.5px solid #e5e2dd" }}>Total Calls</th>
                        <th style={{ padding: "9px 14px", textAlign: "right", fontSize: 10.5, fontWeight: 700, color: "#e8590c", letterSpacing: "0.06em", textTransform: "uppercase", borderBottom: "1.5px solid #e5e2dd" }}>Peak Agents</th>
                        {teams.map((t, i) => (
                          <th key={i} style={{ padding: "9px 14px", textAlign: "right", fontSize: 10.5, fontWeight: 700, color: TEAM_COLORS[i % TEAM_COLORS.length], letterSpacing: "0.06em", textTransform: "uppercase", borderBottom: "1.5px solid #e5e2dd" }}>{t.name}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {weekSummary.map(({ day, totalCalls, peakAgents }, ri) => (
                        <tr key={day} style={{ background: ri % 2 === 0 ? "#fff" : "#fdfcfb" }}>
                          <td style={{ padding: "9px 18px", fontWeight: 700 }}>{day}</td>
                          <td style={{ padding: "9px 14px", textAlign: "right", color: "#5a524c" }}>{totalCalls.toLocaleString()}</td>
                          <td style={{ padding: "9px 14px", textAlign: "right", fontWeight: 700, color: "#e8590c" }}>{peakAgents > 0 ? peakAgents : "—"}</td>
                          {teams.map((t, i) => (
                            <td key={i} style={{ padding: "9px 14px", textAlign: "right", color: TEAM_COLORS[i % TEAM_COLORS.length], fontWeight: 500 }}>{Math.round(totalCalls * (t.pct / 100)).toLocaleString()}</td>
                          ))}
                        </tr>
                      ))}
                      <tr style={{ background: "#f5f3f0", borderTop: "1.5px solid #e5e2dd" }}>
                        <td style={{ padding: "9px 18px", fontWeight: 700, fontSize: 10.5, color: "#5a524c", textTransform: "uppercase", letterSpacing: "0.04em" }}>Week Total</td>
                        <td style={{ padding: "9px 14px", textAlign: "right", fontWeight: 700 }}>{grandTotal.toLocaleString()}</td>
                        <td style={{ padding: "9px 14px", textAlign: "right", fontWeight: 700, color: "#e8590c" }}>Max: {Math.max(0, ...weekSummary.map(d => d.peakAgents))}</td>
                        {teams.map((t, i) => (
                          <td key={i} style={{ padding: "9px 14px", textAlign: "right", fontWeight: 700, color: TEAM_COLORS[i % TEAM_COLORS.length] }}>{Math.round(grandTotal * (t.pct / 100)).toLocaleString()}</td>
                        ))}
                      </tr>
                    </tbody>
                  </table>
                </div>

                <div style={{ background: "#fff8f5", border: "1px solid #fbd5be", borderRadius: 8, padding: 15, fontSize: 12, color: "#8a8178", lineHeight: 1.9 }}>
                  <div className="lxs" style={{ marginBottom: 5 }}>Calculation Method</div>
                  <b style={{ color: "#5a524c" }}>Productive mins/agent/hr</b> = 60 × (1 − shrinkage%) − admin time<br />
                  <b style={{ color: "#5a524c" }}>Agents required</b> = (Calls × AHT) ÷ Productive mins/agent/hr<br />
                  <b style={{ color: "#5a524c" }}>Team agents</b> = Agents required × team split %
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
